<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
    <!-- Custom JS -->
    <script type="module" src="pages/details.js" defer></script>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fontdiner+Swanky&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=home,menu,search,settings" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles/style.css">
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" defer></script>
</head>
<body>
    <div id="header"></div>
    <main id="detailsMain">
        <div id="movie-details" class="container mt-4">
            <div class="row">
                <div class="col-md-4">
                    <div class="poster-image-container">
                            <img id="poster-image" src="img/poster_backup.png" class="img-fluid" alt="Movie Poster">
                        <div class="d-flex gap-2 mt-3">
                            <button id="saveToWatchLaterBtn" class="watchLaterBtn w-100 fontdiner-swanky-regular">
                                <span id="watchLaterText">Add to</span> WatchLater
                            </button>
                            <button id="addToFavoritesBtn" class="favoriteBtn w-100 fontdiner-swanky-regular">
                                <span id="favoriteText">Add to</span> Favorites
                            </button>
                        </div>
                    </div>
                </div>
                <div class="col-md-8 movie-details">
                    <h1 id="mediaTitle">Da Name</h1>
                    <h2 class="normal-text"><span id="releaseDate">Da Date </span>&middot <span id="movieLength">Da Length</span> &middot <span id="movieGenres">Da Genre</span></h2>
                    <p id="mediaOverview">Da Details</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
